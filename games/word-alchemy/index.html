<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Word Alchemy</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%A7%AA%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>🧪 Word Alchemy</header>

    <main>
      <section class="laboratory-area">
        <div class="laboratory">
          <div class="panel-title">Element Laboratory</div>
          <div id="elements" class="element-grid"></div>
        </div>
      </section>

      <section class="reaction-area">
        <div class="reaction-panel">
          <div class="panel-title">Latest Reaction</div>
          <div class="reaction-body">
            <div id="reactionIntro" class="reaction-intro">
              Click two words to combine them.
            </div>
            <div id="result" class="result" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <section class="discovery-area">
        <div class="progress-row">
          <div class="stat-card">
            <div class="stat-title">Elements Discovered</div>
            <div id="counter" class="stat-value"></div>
          </div>

          <div class="stat-card">
            <div class="stat-title">Alchemy Completion</div>
            <div id="completionRate" class="completion-value"></div>
          </div>
        </div>

        <div class="log">
          <div class="log-title">Discovery Log</div>
          <ul id="log"></ul>
        </div>
      </section>
    </main>

    <footer>Word Alchemy • 2026</footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>

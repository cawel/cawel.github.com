<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>7th Chords Gen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.svg" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <meta name="theme-color" content="#0e0e0e" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="7th Chords Gen" />
    <meta
      property="og:description"
      content="Jazz harmony trainer for 7th chords: random, ii-V-I major/minor, and cycle of fifths."
    />
    <meta property="og:image" content="social-preview.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="7th Chords Gen" />
    <meta
      name="twitter:description"
      content="Jazz harmony trainer for 7th chords: random, ii-V-I major/minor, and cycle of fifths."
    />
    <meta name="twitter:image" content="social-preview.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=optional"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="control-container">
      <fieldset class="control-panel">
        <legend class="panel-legend">
          <span class="title-icon" aria-hidden="true">🎷</span
          ><span>7th Chords Gen</span>
        </legend>
        <div class="mode-selector">
          <label
            ><input type="radio" name="mode" value="random" checked />
            Random</label
          >

          <div class="random-options" id="randomOptions">
            <label>
              <input type="checkbox" id="randomHalfDim" />
              Include <span class="chord-symbol">ø7</span>
            </label>
            <label>
              <input type="checkbox" id="randomDim" />
              Include <span class="chord-symbol">o7</span>
            </label>
          </div>

          <label
            ><input type="radio" name="mode" value="maj251" /> ii–V–I
            (major)</label
          >
          <label
            ><input type="radio" name="mode" value="min251" /> iiø–V–i
            (minor)</label
          >
          <label
            ><input type="radio" name="mode" value="cycle" />
            Cycle-of-Fifths</label
          >
        </div>

        <div class="button-column">
          <button class="play" id="playBtn" disabled>
            <span class="btn-icon" aria-hidden="true">▶</span>
            <span class="btn-label">Play Chord</span>
          </button>

          <div class="listen-row">
            <button
              class="listen-btn"
              id="listenBtn"
              aria-pressed="false"
              type="button"
            >
              <span class="btn-icon" aria-hidden="true">🎤</span>
              <span class="btn-label">Voice Mode</span>
            </button>
            <button class="voice-help-btn" id="voiceHelpBtn" aria-label="Voice commands help" type="button">ⓘ</button>
          </div>

          <button class="stats-btn" id="statsBtn">
            <span class="btn-icon" aria-hidden="true">📊</span>
            <span class="btn-label">Stats</span>
          </button>
        </div>
      </fieldset>

      <div
        class="status-line"
        id="statusLine"
        role="status"
        aria-live="polite"
        hidden
      ></div>

      <div class="voice-help-popup" id="voiceHelpPopup" role="note" hidden>
        In Voice Mode 🎤, say <kbd>next</kbd> to generate a chord
      </div>

      <button class="next-btn" id="nextBtn">
        <span class="btn-label">Next Chord</span>
      </button>
    </div>

    <main>
      <div class="pills-spacer"></div>

      <div class="info-box" id="infoBox">
        <div class="pill key">
          <span class="pill-label">Key:</span>
          <span class="pill-value" id="keyLabel"></span>
        </div>
        <div class="pill step">
          <span class="pill-label">Step:</span>
          <span class="pill-value" id="stepLabel"></span>
        </div>
      </div>

      <div class="chord" id="chordDisplay"></div>

      <div class="stats-line" id="statsLine">
        Chords generated: <span id="statsCount">0</span>
      </div>
    </main>

    <!-- Modules: harmony engine, audio synthesis, speech recognition, app logic -->
    <script src="js/harmony-engine.js" defer></script>
    <script src="js/synth-engine.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/chord-controller.js" defer></script>
    <script src="js/speech-controller.js" defer></script>
    <script src="js/ui.js" defer></script>
  </body>
</html>
